<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellhub PM — Live View</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --magenta: #F2496B; --magenta-light: #FFB2C6; --magenta-bg: #FFEBF1;
      --purple: #A880FF; --purple-light: #DDCCFF; --purple-bg: #F0E0FF; --purple-deep: #5B4191;
      --lime: #DCFF79; --lime-bg: #F2FFCC; --green: #0C8046;
      --off-white: #FBF8EC; --cream: #F6EDDF; --cream-dark: #ECE0CD;
      --dark: #1D1D1F; --white: #FFFFFF; --border: #E8E2D9; --text-secondary: #6B6B6B;
    }
    body { font-family: 'Inter', sans-serif; background: var(--off-white); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 240px; min-width: 240px; background: var(--dark); color: var(--white); display: flex; flex-direction: column; padding: 24px 0; overflow-y: auto; }
    .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo h1 { font-size: 22px; font-weight: 800; color: var(--magenta); letter-spacing: -0.5px; }
    .readonly-badge { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; background: rgba(220,255,121,0.15); color: var(--lime); border-radius: 999px; padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
    .sidebar-section { padding: 20px 12px 0; }
    .sidebar-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); padding: 0 8px; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); transition: all 0.15s; user-select: none; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
    .nav-item.active { background: var(--magenta); color: var(--white); }
    .nav-item .icon { width: 18px; text-align: center; font-size: 15px; }
    .project-nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); transition: all 0.15s; }
    .project-nav-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
    .project-nav-item.active { color: var(--white); background: rgba(255,255,255,0.1); }
    .project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .project-name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: var(--off-white); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .topbar h2 { font-size: 20px; font-weight: 700; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--green); background: var(--lime-bg); padding: 6px 12px; border-radius: 999px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .content-area { flex: 1; overflow: auto; padding: 28px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--white); border-radius: 12px; padding: 20px; border: 1.5px solid var(--border); }
    .stat-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-sub { font-size: 12px; color: var(--text-secondary); }
    .stat-card.magenta .stat-value { color: var(--magenta); }
    .stat-card.purple .stat-value { color: var(--purple-deep); }
    .stat-card.green .stat-value { color: var(--green); }
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--dark); }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: var(--white); border-radius: 12px; padding: 20px; border: 1.5px solid var(--border); }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .project-card { background: var(--white); border-radius: 12px; padding: 20px; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
    .project-card:hover { border-color: var(--magenta); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(242,73,107,0.1); }
    .project-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .project-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .project-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .project-card p { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
    .progress-bar-wrap { background: var(--cream); border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 8px; }
    .progress-bar-fill { height: 100%; border-radius: 999px; background: var(--magenta); transition: width 0.3s; }
    .progress-bar-fill.done { background: var(--green); }
    .project-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    .board-container { display: flex; gap: 16px; height: 100%; align-items: flex-start; }
    .kanban-column { width: 300px; min-width: 300px; background: var(--cream); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; max-height: calc(100vh - 165px); }
    .column-header { display: flex; align-items: center; margin-bottom: 12px; }
    .column-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
    .column-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 6px; font-size: 12px; font-weight: 700; }
    .col-todo .column-badge { background: var(--purple-bg); color: var(--purple-deep); }
    .col-todo .column-title { color: var(--purple-deep); }
    .col-inprogress .column-badge { background: var(--magenta-bg); color: var(--magenta); }
    .col-inprogress .column-title { color: var(--magenta); }
    .col-done .column-badge { background: var(--lime-bg); color: var(--green); }
    .col-done .column-title { color: var(--green); }
    .tasks-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; min-height: 60px; }
    .task-card { background: var(--white); border-radius: 10px; padding: 14px; border: 1.5px solid var(--border); }
    .task-title { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--dark); margin-bottom: 6px; }
    .task-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .task-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    .task-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .tag-priority-high { background: #FFE5E8; color: #C62828; }
    .tag-priority-medium { background: var(--magenta-bg); color: var(--magenta); }
    .tag-priority-low { background: var(--lime-bg); color: var(--green); }
    .tag-due { background: var(--purple-bg); color: var(--purple-deep); }
    .tag-due.overdue { background: #FFE5E8; color: #C62828; }
    .tag-due.today { background: #FFF8E1; color: #F57F17; }
    .task-assignee { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: var(--purple-light); color: var(--purple-deep); font-size: 10px; font-weight: 700; text-transform: uppercase; flex-shrink: 0; }
    .task-list-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .task-list-item:last-child { border-bottom: none; }
    .task-list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .task-list-name { flex: 1; font-size: 13px; font-weight: 500; }
    .task-list-project { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
    .task-status-badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .status-todo { background: var(--purple-bg); color: var(--purple-deep); }
    .status-inprogress { background: var(--magenta-bg); color: var(--magenta); }
    .status-done { background: var(--lime-bg); color: var(--green); }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text-secondary); gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--magenta); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: #fff5f5; border: 1.5px solid #ffcdd2; border-radius: 12px; padding: 20px; color: #C62828; font-size: 14px; line-height: 1.6; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 999px; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>Wellhub PM</h1>
    <span class="readonly-badge">👁 Read-only view</span>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Menu</div>
    <div class="nav-item active" onclick="showView('dashboard')" id="nav-dashboard"><span class="icon">📊</span> Dashboard</div>
    <div class="nav-item" onclick="showView('projects')" id="nav-projects"><span class="icon">📁</span> All Projects</div>
  </div>
  <div class="sidebar-section" style="flex:1; margin-top:8px;">
    <div class="sidebar-section-label">Projects</div>
    <div id="sidebar-projects"></div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <h2 id="topbar-title">Dashboard</h2>
    <div class="live-badge"><span class="live-dot"></span><span id="live-label">Live data</span></div>
  </div>
  <div class="content-area" id="content-area">
    <div class="loading"><div class="spinner"></div><span>Loading data...</span></div>
  </div>
</div>
<script>
// ── PASTE YOUR APPS SCRIPT URL BELOW ──────────────────────
const SCRIPT_URL = 'PASTE_YOUR_SCRIPT_URL_HERE';
// ──────────────────────────────────────────────────────────

let state = { projects: [], tasks: [] };
let currentView = 'dashboard', currentProjectId = null;

async function fetchData() {
  if (!SCRIPT_URL || SCRIPT_URL.includes('PASTE')) {
    document.getElementById('content-area').innerHTML = `<div class="error-box">⚠️ <strong>Setup needed:</strong> Open this HTML file in a text editor and replace <code>PASTE_YOUR_SCRIPT_URL_HERE</code> with your Apps Script URL (see the Setup Guide in your Drive folder).</div>`;
    return;
  }
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    state = data;
    const now = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    document.getElementById('live-label').textContent = `Updated ${now}`;
    renderContent();
  } catch(e) {
    document.getElementById('live-label').textContent = 'Error loading';
    document.getElementById('content-area').innerHTML = `<div class="error-box">⚠️ Could not load data. Make sure the Apps Script is deployed and the URL is correct.</div>`;
  }
}

function showView(view, projectId) {
  currentView = view; currentProjectId = projectId || null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view); if (navEl) navEl.classList.add('active');
  document.querySelectorAll('.project-nav-item').forEach(el => el.classList.remove('active'));
  if (projectId) { const pEl = document.getElementById('pnav-' + projectId); if (pEl) pEl.classList.add('active'); }
  const title = document.getElementById('topbar-title');
  if (view === 'dashboard') title.textContent = 'Dashboard';
  else if (view === 'projects') title.textContent = 'All Projects';
  else if (view === 'board') { const p = state.projects.find(p => p.id === projectId); title.textContent = p ? escHtml(p.name) : 'Board'; }
  renderContent();
}

function renderDashboard() {
  const total=state.tasks.length, done=state.tasks.filter(t=>t.status==='done').length;
  const inprog=state.tasks.filter(t=>t.status==='inprogress').length;
  const today=new Date().toISOString().split('T')[0];
  const dueToday=state.tasks.filter(t=>t.dueDate===today&&t.status!=='done').length;
  const recent=[...state.tasks].sort((a,b)=>b.createdAt-a.createdAt).slice(0,8);
  const overdue=state.tasks.filter(t=>t.dueDate&&t.dueDate<today&&t.status!=='done').slice(0,5);
  return `<div class="stats-grid">
    <div class="stat-card magenta"><div class="stat-label">Total Tasks</div><div class="stat-value">${total}</div><div class="stat-sub">${state.projects.length} projects</div></div>
    <div class="stat-card purple"><div class="stat-label">In Progress</div><div class="stat-value">${inprog}</div><div class="stat-sub">active tasks</div></div>
    <div class="stat-card green"><div class="stat-label">Completed</div><div class="stat-value">${done}</div><div class="stat-sub">${total?Math.round(done/total*100):0}% complete</div></div>
    <div class="stat-card"><div class="stat-label">Due Today</div><div class="stat-value" style="color:${dueToday>0?'#F57F17':'var(--dark)'}">${dueToday}</div><div class="stat-sub">need attention</div></div>
  </div>
  <div class="dashboard-grid">
    <div class="card"><div class="section-title">Recent Tasks</div>${recent.length===0?'<p style="font-size:13px;color:var(--text-secondary)">No tasks yet.</p>':recent.map(t=>{const p=state.projects.find(p=>p.id===t.projectId);return`<div class="task-list-item"><span class="task-list-dot" style="background:${p?.color||'#ccc'}"></span><span class="task-list-name">${escHtml(t.title)}</span><span class="task-list-project">${p?escHtml(p.name):''}</span><span class="task-status-badge status-${t.status}">${statusLabel(t.status)}</span></div>`;}).join('')}</div>
    <div class="card"><div class="section-title">Projects Overview</div>${state.projects.length===0?'<p style="font-size:13px;color:var(--text-secondary)">No projects yet.</p>':state.projects.map(p=>{const pt=state.tasks.filter(t=>t.projectId===p.id);const pct=pt.length?Math.round(pt.filter(t=>t.status==='done').length/pt.length*100):0;return`<div class="task-list-item" onclick="showView('board','${p.id}')" style="cursor:pointer"><span class="task-list-dot" style="background:${p.color}"></span><span class="task-list-name">${escHtml(p.name)}</span><span class="task-list-project">${pt.length} tasks</span><span style="font-size:12px;font-weight:700;color:${pct===100?'var(--green)':'var(--text-secondary)'}">${pct}%</span></div>`;}).join('')}${overdue.length>0?`<div style="margin-top:16px"><div class="section-title" style="color:#C62828;font-size:13px;margin-bottom:8px">⚠ Overdue</div>${overdue.map(t=>`<div class="task-list-item"><span class="task-list-dot" style="background:#C62828"></span><span class="task-list-name">${escHtml(t.title)}</span><span class="task-list-project">${t.dueDate}</span></div>`).join('')}</div>`:''}</div>
  </div>`;
}

function renderProjectsView() {
  if (!state.projects.length) return `<div style="padding:60px;text-align:center;color:var(--text-secondary)"><div style="font-size:48px;margin-bottom:16px;opacity:0.4">📁</div><p>No projects yet.</p></div>`;
  return `<div class="projects-grid">${state.projects.map(p=>{const pt=state.tasks.filter(t=>t.projectId===p.id);const pct=pt.length?Math.round(pt.filter(t=>t.status==='done').length/pt.length*100):0;return`<div class="project-card" onclick="showView('board','${p.id}')"><div class="project-card-header"><div><h3>${escHtml(p.name)}</h3><p>${escHtml(p.description||'No description')}</p></div><span class="project-color-dot" style="background:${p.color}"></span></div><div class="progress-bar-wrap"><div class="progress-bar-fill ${pct===100?'done':''}" style="width:${pct}%"></div></div><div class="project-meta"><span>${pt.length} tasks</span><span>${pct}% complete</span></div></div>`;}).join('')}</div>`;
}

function renderBoard() {
  const cols=[{id:'todo',label:'To Do',cls:'col-todo'},{id:'inprogress',label:'In Progress',cls:'col-inprogress'},{id:'done',label:'Done',cls:'col-done'}];
  const pt=state.tasks.filter(t=>t.projectId===currentProjectId);
  return `<div class="board-container">${cols.map(col=>{const tasks=pt.filter(t=>t.status===col.id);return`<div class="kanban-column ${col.cls}"><div class="column-header"><div class="column-title"><span class="column-badge">${tasks.length}</span>${col.label}</div></div><div class="tasks-list">${tasks.map(t=>{const today=new Date().toISOString().split('T')[0];let dc='tag-due';if(t.dueDate&&t.status!=='done'){if(t.dueDate<today)dc='tag-due overdue';else if(t.dueDate===today)dc='tag-due today';}const ini=t.assignee?t.assignee.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase():'';return`<div class="task-card"><div class="task-title">${escHtml(t.title)}</div>${t.description?`<div class="task-desc">${escHtml(t.description)}</div>`:''}<div class="task-footer"><div class="task-tags"><span class="tag tag-priority-${t.priority}">${t.priority}</span>${t.dueDate?`<span class="tag ${dc}">📅 ${formatDate(t.dueDate)}</span>`:''}</div>${ini?`<span class="task-assignee" title="${escHtml(t.assignee)}">${ini}</span>`:''}</div></div>`;}).join('')}</div></div>`;}).join('')}</div>`;
}

function renderContent() {
  const area=document.getElementById('content-area');
  if(currentView==='dashboard') area.innerHTML=renderDashboard();
  else if(currentView==='projects') area.innerHTML=renderProjectsView();
  else if(currentView==='board'){const p=state.projects.find(p=>p.id===currentProjectId);if(!p){showView('projects');return;}area.innerHTML=renderBoard();}
  renderSidebar();
}

function renderSidebar() {
  document.getElementById('sidebar-projects').innerHTML=state.projects.map(p=>`<div class="project-nav-item ${currentProjectId===p.id?'active':''}" id="pnav-${p.id}" onclick="showView('board','${p.id}')"><span class="project-dot" style="background:${p.color}"></span><span class="project-name-text">${escHtml(p.name)}</span></div>`).join('');
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function statusLabel(s){return{todo:'To Do',inprogress:'In Progress',done:'Done'}[s]||s;}
function formatDate(d){if(!d)return'';const[,m,day]=d.split('-');return`${day}/${m}`;}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
