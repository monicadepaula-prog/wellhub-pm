<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellhub PM — Live View</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #FBF8EC; color: #1D1D1F; display: flex; height: 100vh; overflow: hidden; }

  #sidebar { width: 260px; min-width: 260px; background: #1D1D1F; color: #fff; display: flex; flex-direction: column; overflow-y: auto; }
  #sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid #333; }
  #sidebar-header h1 { font-size: 20px; font-weight: 800; color: #F2496B; }
  .badge { display: inline-flex; align-items: center; gap: 6px; background: #2a2a2a; border: 1px solid #444; border-radius: 20px; padding: 4px 10px; font-size: 11px; color: #DCFF79; margin-top: 8px; }
  .badge::before { content: ''; width: 7px; height: 7px; background: #DCFF79; border-radius: 50%; }
  #sync-status { font-size: 11px; color: #888; padding: 8px 20px; border-bottom: 1px solid #222; }
  #nav { padding: 12px 0; border-bottom: 1px solid #222; }
  .nav-label { font-size: 10px; font-weight: 600; color: #666; letter-spacing: .08em; text-transform: uppercase; padding: 0 20px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; color: #ccc; }
  .nav-item:hover { background: #2a2a2a; color: #fff; }
  .nav-item.active { background: #F2496B; color: #fff; }
  .nav-item .icon { font-size: 16px; }
  #project-list { padding: 12px 0; flex: 1; }
  .proj-label { font-size: 10px; font-weight: 600; color: #666; letter-spacing: .08em; text-transform: uppercase; padding: 0 20px 6px; }
  .proj-item { display: flex; align-items: center; gap: 8px; padding: 7px 20px; font-size: 13px; cursor: pointer; color: #aaa; transition: background .15s; }
  .proj-item:hover { background: #2a2a2a; color: #fff; }
  .proj-item.active { color: #fff; font-weight: 600; }
  .proj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  #main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  #topbar { padding: 20px 32px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #topbar h2 { font-size: 26px; font-weight: 800; }
  #refresh-btn { background: #1D1D1F; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  #refresh-btn:hover { background: #333; }
  #content { padding: 20px 32px 32px; flex: 1; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e8e3d5; }
  .stat-card .label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .stat-card .value { font-size: 32px; font-weight: 800; }

  .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .col { background: #fff; border-radius: 12px; border: 1px solid #e8e3d5; overflow: hidden; }
  .col-header { padding: 14px 16px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e3d5; }
  .col-header .col-count { background: #f3f0e8; color: #888; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .col-header.todo { color: #888; }
  .col-header.inprogress { color: #A880FF; }
  .col-header.done { color: #0C8046; }
  .col-body { padding: 12px; min-height: 100px; display: flex; flex-direction: column; gap: 10px; }

  .task-card { background: #FBF8EC; border: 1px solid #e8e3d5; border-radius: 10px; padding: 14px; }
  .task-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .task-desc { font-size: 12px; color: #666; margin-bottom: 10px; line-height: 1.4; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .tag.high { background: #FFE4E8; color: #c0003c; }
  .tag.medium { background: #FFF3CD; color: #856404; }
  .tag.low { background: #d1ecf1; color: #0c5460; }
  .tag.date { background: #F0E0FF; color: #5B4191; }
  .tag.assignee { background: #e8f5e9; color: #1b5e20; }
  .tag.project { color: #fff; }

  .proj-board { display: flex; flex-direction: column; gap: 16px; }
  .proj-card { background: #fff; border-radius: 12px; border: 1px solid #e8e3d5; padding: 20px; }
  .proj-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .proj-card-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .proj-card-name { font-size: 16px; font-weight: 700; }
  .proj-card-desc { font-size: 13px; color: #666; margin-bottom: 14px; }
  .proj-progress { height: 6px; background: #f3f0e8; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .proj-progress-bar { height: 100%; border-radius: 3px; background: #F2496B; transition: width .4s; }
  .proj-stats { font-size: 12px; color: #888; }

  .error-box { background: #fff0f3; border: 1px solid #ffc0cb; border-radius: 10px; padding: 16px 20px; color: #c0003c; font-size: 14px; margin-top: 16px; }
  .loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }

  @media (max-width: 900px) {
    #sidebar { width: 200px; min-width: 200px; }
    .kanban { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Wellhub PM</h1>
    <div class="badge">Read-only view</div>
  </div>
  <div id="sync-status">Loading...</div>
  <div id="nav">
    <div class="nav-label">Menu</div>
    <div class="nav-item active" id="nav-dashboard" onclick="showView('dashboard')">
      <span class="icon">📊</span> Dashboard
    </div>
    <div class="nav-item" id="nav-board" onclick="showView('board')">
      <span class="icon">🗂️</span> All Tasks
    </div>
    <div class="nav-item" id="nav-projects" onclick="showView('projects')">
      <span class="icon">📁</span> All Projects
    </div>
  </div>
  <div id="project-list">
    <div class="proj-label">Projects</div>
    <div id="proj-nav-items"></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="view-title">Dashboard</h2>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
  <div id="content"><div class="loading">Loading data...</div></div>
</div>

<script>
const state = { projects: [], tasks: [], currentView: 'dashboard', currentProject: null };

async function loadData() {
  document.getElementById('sync-status').textContent = 'Syncing...';
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    state.projects = data.projects || [];
    state.tasks    = data.tasks    || [];
    const now = new Date().toLocaleTimeString();
    document.getElementById('sync-status').textContent = 'Last synced: ' + now;
    renderSidebar();
    renderView();
  } catch (e) {
    document.getElementById('sync-status').textContent = 'Sync failed';
    document.getElementById('content').innerHTML =
      `<div class="error-box">⚠️ Could not load data.json.<br><br><small>${e.message}</small></div>`;
  }
}

function renderSidebar() {
  document.getElementById('proj-nav-items').innerHTML = state.projects.map(p => `
    <div class="proj-item ${state.currentProject === p.id ? 'active' : ''}" onclick="showProject('${p.id}')">
      <span class="proj-dot" style="background:${p.color || '#A880FF'}"></span>
      ${esc(p.name)}
    </div>`).join('');
}

function showView(v) {
  state.currentView = v;
  state.currentProject = null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');
  document.querySelectorAll('.proj-item').forEach(el => el.classList.remove('active'));
  const titles = { dashboard: 'Dashboard', board: 'All Tasks', projects: 'All Projects' };
  document.getElementById('view-title').textContent = titles[v] || v;
  renderView();
}

function showProject(id) {
  state.currentView = 'project';
  state.currentProject = id;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.proj-item').forEach(el => el.classList.remove('active'));
  const p = state.projects.find(x => x.id === id);
  document.getElementById('view-title').textContent = p ? p.name : 'Project';
  renderSidebar();
  renderView();
}

function renderView() {
  const c = document.getElementById('content');
  if (state.currentView === 'dashboard') c.innerHTML = renderDashboard();
  else if (state.currentView === 'board') c.innerHTML = renderBoard(state.tasks);
  else if (state.currentView === 'projects') c.innerHTML = renderProjects();
  else if (state.currentView === 'project') c.innerHTML = renderBoard(state.tasks.filter(t => t.projectId === state.currentProject));
}

function renderDashboard() {
  const total   = state.tasks.length;
  const done    = state.tasks.filter(t => t.status === 'done').length;
  const prog    = state.tasks.filter(t => t.status === 'inprogress').length;
  const todo    = state.tasks.filter(t => t.status === 'todo').length;
  const today   = new Date().toISOString().split('T')[0];
  const overdue = state.tasks.filter(t => t.dueDate && t.dueDate < today && t.status !== 'done').length;
  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Total Tasks</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">To Do</div><div class="value" style="color:#888">${todo}</div></div>
      <div class="stat-card"><div class="label">In Progress</div><div class="value" style="color:#A880FF">${prog}</div></div>
      <div class="stat-card"><div class="label">Done</div><div class="value" style="color:#0C8046">${done}</div></div>
      <div class="stat-card"><div class="label">Projects</div><div class="value" style="color:#F2496B">${state.projects.length}</div></div>
      <div class="stat-card"><div class="label">Overdue</div><div class="value" style="color:${overdue > 0 ? '#c0003c' : '#888'}">${overdue}</div></div>
    </div>
    ${state.projects.length === 0 ? '<p style="color:#888;font-size:14px">No data yet. Publish from the Editor app to see tasks here.</p>' : renderProjects()}`;
}

function renderBoard(tasks) {
  if (tasks.length === 0) return '<p style="color:#888;font-size:14px;margin-top:8px">No tasks here yet.</p>';
  const cols = [
    { key: 'todo',       label: 'To Do',      cls: 'todo' },
    { key: 'inprogress', label: 'In Progress', cls: 'inprogress' },
    { key: 'done',       label: 'Done',        cls: 'done' },
  ];
  return `<div class="kanban">${cols.map(col => {
    const ct = tasks.filter(t => t.status === col.key);
    return `<div class="col">
      <div class="col-header ${col.cls}">${col.label} <span class="col-count">${ct.length}</span></div>
      <div class="col-body">${ct.map(renderCard).join('') || '<p style="font-size:12px;color:#aaa;text-align:center;padding:16px 0">Empty</p>'}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderCard(t) {
  const proj    = state.projects.find(p => p.id === t.projectId);
  const today   = new Date().toISOString().split('T')[0];
  const overdue = t.dueDate && t.dueDate < today && t.status !== 'done';
  return `<div class="task-card">
    <div class="task-title">${esc(t.title)}</div>
    ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
    <div class="task-meta">
      ${t.priority ? `<span class="tag ${t.priority}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>` : ''}
      ${t.dueDate   ? `<span class="tag date" style="${overdue ? 'background:#FFE4E8;color:#c0003c' : ''}">📅 ${t.dueDate}</span>` : ''}
      ${t.assignee  ? `<span class="tag assignee">👤 ${esc(t.assignee)}</span>` : ''}
      ${proj        ? `<span class="tag project" style="background:${proj.color||'#A880FF'}">${esc(proj.name)}</span>` : ''}
    </div>
  </div>`;
}

function renderProjects() {
  if (state.projects.length === 0) return '<p style="color:#888;font-size:14px">No projects yet.</p>';
  return `<div class="proj-board">${state.projects.map(p => {
    const tasks = state.tasks.filter(t => t.projectId === p.id);
    const done  = tasks.filter(t => t.status === 'done').length;
    const pct   = tasks.length ? Math.round(done / tasks.length * 100) : 0;
    return `<div class="proj-card">
      <div class="proj-card-header">
        <span class="proj-card-dot" style="background:${p.color||'#A880FF'}"></span>
        <span class="proj-card-name">${esc(p.name)}</span>
      </div>
      ${p.description ? `<div class="proj-card-desc">${esc(p.description)}</div>` : ''}
      <div class="proj-progress"><div class="proj-progress-bar" style="width:${pct}%;background:${p.color||'#F2496B'}"></div></div>
      <div class="proj-stats">${done}/${tasks.length} tasks done (${pct}%)</div>
    </div>`;
  }).join('')}</div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
